name: 💡 Feature Request
description: Suggest a scoped feature, app-pack expansion, or documentation improvement
title: "[FEATURE] "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please keep the request tied to a lane, app pack, or public repo surface.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please check the following before submitting
      options:
        - label: I have searched existing issues and discussions to avoid duplicates
          required: true
        - label: I have read the [Contributing Guidelines](../../CONTRIBUTING.md)
          required: true
        - label: I checked the current repo truth and this request fits the stated direction
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: Which area does this request relate to?
      options:
        - New app pack or lane
        - Existing standalone app root
        - Template family under Sources
        - Examples router
        - Proof, media, or gallery surface
        - Documentation or onboarding
        - Validation or CI workflow
        - Release or GitHub distribution surface
        - Other
    validations:
      required: true

  - type: input
    id: affected_lane
    attributes:
      label: Affected Lane or App Pack
      description: Which lane, app pack, or path does this request target?
      placeholder: "e.g., MarketplaceApp or Commerce lane"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe the issue you're trying to solve.
      placeholder: "As a [type of user], I'm frustrated when [current situation] because [reason]..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented
      placeholder: "I would like to see [specific feature] that would allow users to [specific benefit]..."
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefits & Use Cases
      description: Explain the benefits and real-world use cases for this feature
      placeholder: |
        - Benefit 1: [description]
        - Use case 1: [scenario]
        - Impact: [who benefits and how]

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: "Alternative 1: [description and why it's not ideal]..."

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: If you have ideas about how this could be implemented, please share them
      placeholder: "This could potentially be implemented by..."

  - type: textarea
    id: code_example
    attributes:
      label: Code Example or Mockup
      description: Provide a code example, API design, or visual mockup if applicable
      render: swift
      placeholder: |
        // Example API usage
        import iOSAppTemplates
        
        // Your proposed API or implementation idea here

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature for your use case?
      options:
        - High - Critical for my project's success
        - Medium - Would significantly improve my workflow
        - Low - Nice to have enhancement
        - Future - Not urgent, but valuable long-term
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Proof Impact
      description: Would this request require new proof, media, or public-claim changes?
      options:
        - Yes - It changes public proof or claim surfaces
        - Maybe - It likely affects docs or gallery routing
        - No - It is internal only

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies & Requirements
      description: Are there any dependencies, third-party libraries, or platform requirements?
      placeholder: |
        - Platform requirements: iOS 18.0+, visionOS 2.0+
        - Dependencies: [list any required libraries]
        - Hardware requirements: [if any]

  - type: textarea
    id: breaking_changes
    attributes:
      label: Breaking Changes
      description: Would this feature require any breaking changes to existing APIs?
      placeholder: "This feature would/would not require breaking changes because..."

  - type: textarea
    id: documentation
    attributes:
      label: Documentation Impact
      description: What documentation would need to be created or updated?
      placeholder: |
        - New guides needed: [list]
        - API documentation updates: [describe]
        - Example projects: [describe]

  - type: textarea
    id: testing
    attributes:
      label: Validation Considerations
      description: How should this feature be validated? What edge cases should be considered?
      placeholder: |
        - Root build/test: [describe]
        - Standalone app root validation: [describe]
        - Docs/proof/media validation: [describe]

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, links, or information that would be helpful
      placeholder: |
        - Related issues: #[number]
        - External resources: [links]
        - Screenshots or mockups: [attach files]

  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How would you know this feature is complete?
      placeholder: |
        - New paths or app packs added
        - New proof or media surface added
        - Validation commands that should pass
