name: Docs Quality

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate portfolio surface
        run: bash Scripts/validate-portfolio-surface.sh
      - name: Validate app proof surfaces
        run: bash Scripts/validate-app-proof-surfaces.sh
      - name: Validate template root readmes
        run: bash Scripts/validate-template-root-readmes.sh
      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --exclude "img.shields.io|starchart.cc" --verbose --no-progress "**/*.md"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
