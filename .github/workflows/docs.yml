name: Docs Quality

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate portfolio surface
        run: bash Scripts/validate-portfolio-surface.sh
      - name: Validate trust surfaces
        run: bash Scripts/validate-trust-surfaces.sh
      - name: Validate GitHub distribution surface
        run: bash Scripts/validate-github-distribution-surface.sh
      - name: Validate generated app surfaces
        run: bash Scripts/validate-generated-app-surfaces.sh
      - name: Validate standalone iOS proof surface
        run: bash Scripts/validate-standalone-ios-proof-surface.sh
      - name: Validate README visual assets
        run: bash Scripts/validate-readme-visual-assets.sh
      - name: Validate app proof surfaces
        run: bash Scripts/validate-app-proof-surfaces.sh
      - name: Validate template root readmes
        run: bash Scripts/validate-template-root-readmes.sh
      - name: Validate standalone root lockfiles
        run: bash Scripts/validate-standalone-root-lockfiles.sh
      - name: Validate app media surfaces
        run: bash Scripts/validate-app-media-surfaces.sh
      - name: Validate app scenario shots
        run: bash Scripts/validate-app-scenario-shots.sh
      - name: Validate app scenario pages
        run: bash Scripts/validate-app-scenario-pages.sh
      - name: Validate app scenario boards
        run: bash Scripts/validate-app-scenario-boards.sh
      - name: Validate app demo clips
        run: bash Scripts/validate-app-demo-clips.sh
      - name: Validate app gallery cards
        run: bash Scripts/validate-app-gallery-cards.sh
      - name: Validate app preview boards
        run: bash Scripts/validate-app-preview-boards.sh
      - name: Validate Wave 1 surfaces
        run: bash Scripts/validate-wave1-surfaces.sh
      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --exclude "img.shields.io|starchart.cc" --verbose --no-progress "**/*.md"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
