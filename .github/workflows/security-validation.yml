name: Security Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * *'

jobs:
  security-surface:
    name: Security Surface Validation
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build release package
        run: swift build -c release

      - name: Run active security smoke tests
        run: swift test --filter SecuritySurfaceTests

      - name: Validate security source surface
        run: |
          test -f Sources/SecurityTemplates/SecureAppTemplate.swift
          test -f Documentation/SecurityAPI.md
          rg -n "import LocalAuthentication|import CryptoKit|public class EncryptionManager|public class SecureStorageManager|public struct DataValidator" Sources/SecurityTemplates/SecureAppTemplate.swift

      - name: Write security summary
        run: |
          mkdir -p security-artifacts
          {
            echo "Security validation completed."
            echo "Current truth:"
            echo "- Validates active SecurityTemplates source surface"
            echo "- Runs SecuritySurfaceTests smoke suite"
            echo "- Does not claim compliance certification or penetration-testing proof"
          } > security-artifacts/summary.txt

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-surface-results
          path: security-artifacts
