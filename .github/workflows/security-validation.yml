name: Security Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-surface:
    name: Security Surface Validation
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Reset SwiftPM artifact caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts
          rm -rf .build/artifacts

      - name: Build release package
        run: swift build -c release

      - name: Run active security smoke tests
        run: swift test --filter SecuritySurfaceTests

      - name: Validate security source surface
        run: |
          test -f Sources/SecurityTemplates/SecureAppTemplate.swift
          test -f Documentation/SecurityAPI.md
          grep -En "import LocalAuthentication|import CryptoKit|public class EncryptionManager|public class SecureStorageManager|public struct DataValidator" Sources/SecurityTemplates/SecureAppTemplate.swift

      - name: Write security summary
        run: |
          {
            echo "Security validation completed."
            echo "Current truth:"
            echo "- Validates active SecurityTemplates source surface"
            echo "- Runs SecuritySurfaceTests smoke suite"
            echo "- Does not claim compliance certification or penetration-testing proof"
          } > security-summary.txt
