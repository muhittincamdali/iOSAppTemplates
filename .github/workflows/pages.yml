name: Deploy Documentation

on:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build Documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --disable-indexing \
            --transform-for-static-hosting \
            --output-path ./docs 2>/dev/null || echo "DocC build skipped"

      - name: Skip when Pages is disabled
        if: ${{ !github.event.repository.has_pages }}
        run: echo "GitHub Pages is not enabled for this repository. Skipping Pages deployment."

      - name: Setup Pages
        if: ${{ github.event.repository.has_pages }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: ${{ github.event.repository.has_pages }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: ${{ github.event.repository.has_pages }}
        id: deployment
        uses: actions/deploy-pages@v4
