name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build Package
      run: swift build -c release
    
    - name: Generate Changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body: |
          ## What Changed
          ${{ steps.changelog.outputs.changelog }}
          
          ## Current Repo Truth

          - `iOSAppTemplates` is a starter-portfolio repository, not a claim that all app packs have equal production maturity.
          - Use the README, portfolio matrix, proof matrix, and app gallery as the canonical public surfaces.
          - Do not treat a version tag alone as proof of full complete-app parity.

          ## Start Here

          - README: https://github.com/${{ github.repository }}#readme
          - Documentation Hub: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation/README.md
          - Portfolio Matrix: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation/Portfolio-Matrix.md
          - Proof Matrix: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation/Proof-Matrix.md
          - App Gallery: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation/App-Gallery.md

          ## Installation
          
          ### Swift Package Manager
          ```swift
          dependencies: [
              .package(url: "https://github.com/muhittincamdali/${{ github.event.repository.name }}.git", from: "${{ github.ref_name }}")
          ]
          ```
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
