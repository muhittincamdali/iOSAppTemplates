name: Performance Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance-smoke:
    name: Performance Smoke
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Reset SwiftPM artifact caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts
          rm -rf .build/artifacts

      - name: Run active performance tests
        run: swift test --filter PerformanceBenchmarkTests

      - name: Write performance summary
        run: |
          {
            echo "Performance validation completed."
            echo "Current truth:"
            echo "- Uses active package test target: PerformanceBenchmarkTests"
            echo "- Does not claim device-lab metrics or release benchmark proof"
          } > performance-summary.txt
