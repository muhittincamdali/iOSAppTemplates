name: Performance Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'

jobs:
  performance-smoke:
    name: Performance Smoke
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build release package
        run: swift build -c release

      - name: Run active performance tests
        run: swift test --filter PerformanceBenchmarkTests

      - name: Write performance summary
        run: |
          mkdir -p performance-artifacts
          {
            echo "Performance validation completed."
            echo "Current truth:"
            echo "- Uses active package test target: PerformanceBenchmarkTests"
            echo "- Does not claim device-lab metrics or release benchmark proof"
          } > performance-artifacts/summary.txt

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-results
          path: performance-artifacts
